<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDD v0.1 — Echo Throne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0a0c12;
      --panel: #12151f;
      --border: #2a3044;
      --text: #d8dce8;
      --muted: #8890a8;
      --blood: #c42b3e;
      --link: #8ab4f8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      margin: 0;
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(10,12,18,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      backdrop-filter: blur(8px);
    }
    nav a {
      color: var(--link);
      text-decoration: none;
      font-size: 0.9rem;
    }
    nav a:hover { text-decoration: underline; }
    nav .title {
      font-family: Cinzel, serif;
      color: #fff;
      letter-spacing: 0.1em;
      font-size: 0.95rem;
    }
    #content {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    #content h1, #content h2, #content h3 {
      font-family: Cinzel, serif;
      color: #fff;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    #content h1 { font-size: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    #content h2 { font-size: 1.35rem; color: #c9a227; }
    #content h3 { font-size: 1.1rem; }
    #content p, #content li { color: var(--muted); }
    #content strong { color: var(--text); }
    #content a { color: var(--link); }
    #content code {
      background: var(--panel);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    #content pre {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 1rem;
      overflow-x: auto;
      border-radius: 4px;
    }
    #content pre code { background: none; padding: 0; }
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    #content th { background: var(--panel); color: #fff; }
    #content blockquote {
      border-left: 3px solid var(--blood);
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      background: var(--panel);
      color: var(--muted);
    }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .loading { text-align: center; padding: 4rem; color: var(--muted); }
    .error { color: var(--blood); padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">← Início</a>
    <span class="title">ECHO THRONE</span>
    <a href="design/GDD-v0.1.md">Markdown raw</a>
  </nav>
  <div id="content" class="loading">Carregando GDD…</div>
  <script>
    fetch('design/GDD-v0.1.md')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => {
        document.getElementById('content').className = '';
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(e => {
        document.getElementById('content').className = 'error';
        document.getElementById('content').textContent = 'Erro ao carregar GDD: ' + e.message;
      });
  </script>
</body>
</html>
